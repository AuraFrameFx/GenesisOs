systemProp.java.vendor=Oracle Corporation
systemProp.java.vm.specification.version=24
systemProp.java.specification.version=24

# ===== TOOLCHAIN AUTO-PROVISIONING =====
# Gradle 9.0.0 + AGP 8.13.0-alpha04 auto-provisions JDK 24
org.gradle.java.installations.auto-download=true
org.gradle.java.installations.auto-detect=true
org.gradle.toolchain.version=24

# ===== GENESIS-OS JVM CONFIGURATION: AUTO-EVERYTHING =====
