org.gradle.java.installations.fromEnv=JAVA_HOME,JDK_HOME

# ===== ORACLE OPENJDK 24.02 CONFIGURATION =====
# Gradle will auto-download Oracle OpenJDK 24.02 when needed
# Following Sacred Rule #8: NO MANUAL ANYTHING
