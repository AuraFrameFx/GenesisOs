// Stability configuration for Compose compiler
{
    // Mark all classes in the project as stable by default
    "@dev/aurakai/auraframefx/coremodule/**/*": {
        "stable": true
    },
    
    // Explicitly mark common types as stable
    "kotlin/Unit": {
        "stable": true
    },
    "kotlin/Boolean": {
        "stable": true
    },
    "kotlin/String": {
        "stable": true
    },
    "kotlin/Int": {
        "stable": true
    },
    "kotlin/Long": {
        "stable": true
    },
    "kotlin/Float": {
        "stable": true
    },
    "kotlin/Double": {
        "stable": true
    },
    "kotlin/collections/List": {
        "stable": true
    },
    "kotlin/collections/Set": {
        "stable": true
    },
    "kotlin/collections/Map": {
        "stable": true
    }
}
