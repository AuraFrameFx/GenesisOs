name: Android Build

on:
  push:
    branches: [ main, develop, master ]
  pull_request:
    branches: [ main, develop, master ]
  workflow_dispatch:

env:
  GRADLE_OPTS: -Xmx6g -Xms2g -XX:+UseG1GC

jobs:
  validate:
    name: Validate Project
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate Gradle Wrapper
        uses: gradle/wrapper-validation-action@v1

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties', '**/libs.versions.toml') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Check Gradle Dependencies
        run: ./gradlew dependencies --configuration compileClasspath --quiet

  build:
    name: Build APK
    runs-on: ubuntu-latest
    needs: validate
    strategy:
      matrix:
        build-type: [debug, release]
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            ~/.gradle/nodejs
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties', '**/libs.versions.toml') }}

      - name: Cache NDK
        uses: actions/cache@v4
        with:
          path: ~/.android/ndk
          key: ${{ runner.os }}-ndk-${{ hashFiles('**/build.gradle.kts') }}

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Clean previous builds
        run: ./gradlew clean --no-daemon

      - name: Generate OpenAPI clients
        run: ./gradlew generateAllOpenApiClients --no-daemon

      - name: Process KSP annotations
        run: ./gradlew kspDebugKotlin --no-daemon

      - name: Build native libraries
        run: |
          ./gradlew :app:externalNativeBuild${{ matrix.build-type == 'release' && 'Release' || 'Debug' }} --no-daemon || true
          ./gradlew :collab-canvas:externalNativeBuild${{ matrix.build-type == 'release' && 'Release' || 'Debug' }} --no-daemon || true
          ./gradlew :romtools:externalNativeBuild${{ matrix.build-type == 'release' && 'Release' || 'Debug' }} --no-daemon || true

      - name: Compile Kotlin
        run: ./gradlew compile${{ matrix.build-type == 'release' && 'Release' || 'Debug' }}Kotlin --no-daemon

      - name: Build APK
        run: ./gradlew assemble${{ matrix.build-type == 'release' && 'Release' || 'Debug' }} --no-daemon --parallel

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: genesis-os-${{ matrix.build-type }}-apk
          path: app/build/outputs/apk/${{ matrix.build-type }}/*.apk
          retention-days: ${{ matrix.build-type == 'release' && 90 || 30 }}

  test:
    name: Run Tests
    runs-on: ubuntu-latest
    needs: validate
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties', '**/libs.versions.toml') }}

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Run unit tests
        run: ./gradlew testDebugUnitTest --no-daemon

      - name: Generate test report
        uses: dorny/test-reporter@v1
        if: success() || failure()
        with:
          name: Test Results
          path: '**/build/test-results/testDebugUnitTest/TEST-*.xml'
          reporter: java-junit

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            **/build/reports/tests/
            **/build/test-results/
          retention-days: 30

  lint:
    name: Static Analysis
    runs-on: ubuntu-latest
    needs: validate
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties', '**/libs.versions.toml') }}

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Run lint
        run: ./gradlew lintDebug --no-daemon

      - name: Upload lint reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lint-results
          path: |
            **/build/reports/lint-results-*.html
            **/build/reports/lint-results-*.xml
          retention-days: 30

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'

      - name: Upload Trivy scan results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'