version: 2
updates:
  # GitHub Actions dependencies
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
    open-pull-requests-limit: 5
    reviewers:
      - "AuraFrameFxDev"
    labels:
      - "dependencies"
      - "github-actions"

  # Gradle dependencies (main project)
  - package-ecosystem: "gradle"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "tuesday"
      time: "09:00"
    open-pull-requests-limit: 10
    reviewers:
      - "AuraFrameFxDev"
    labels:
      - "dependencies"
      - "gradle"
    ignore:
      # Ignore major version updates for stability
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
    groups:
      android-deps:
        patterns:
          - "com.android.*"
          - "androidx.*"
      kotlin-deps:
        patterns:
          - "org.jetbrains.kotlin*"
          - "org.jetbrains.kotlinx*"
      compose-deps:
        patterns:
          - "androidx.compose.*"
      firebase-deps:
        patterns:
          - "com.google.firebase*"
      testing-deps:
        patterns:
          - "*junit*"
          - "*espresso*"
          - "*mockito*"

  # App module specific dependencies
  - package-ecosystem: "gradle"
    directory: "/app"
    schedule:
      interval: "weekly"
      day: "wednesday"
      time: "09:00"
    open-pull-requests-limit: 5
    reviewers:
      - "AuraFrameFxDev"
    labels:
      - "dependencies"
      - "app-module"

  # Core module dependencies
  - package-ecosystem: "gradle"
    directory: "/core-module"
    schedule:
      interval: "weekly"
      day: "thursday"
      time: "09:00"
    open-pull-requests-limit: 5
    reviewers:
      - "AuraFrameFxDev"
    labels:
      - "dependencies"
      - "core-module"

  # Security-sensitive modules
  - package-ecosystem: "gradle"
    directory: "/secure-comm"
    schedule:
      interval: "daily"
    open-pull-requests-limit: 3
    reviewers:
      - "AuraFrameFxDev"
    labels:
      - "dependencies"
      - "security"
      - "secure-comm"

  # Native modules
  - package-ecosystem: "gradle"
    directory: "/romtools"
    schedule:
      interval: "weekly"
      day: "friday"
      time: "09:00"
    open-pull-requests-limit: 3
    reviewers:
      - "AuraFrameFxDev"
    labels:
      - "dependencies"
      - "native"
      - "romtools"

  - package-ecosystem: "gradle"
    directory: "/collab-canvas"
    schedule:
      interval: "weekly"
      day: "friday"
      time: "10:00"
    open-pull-requests-limit: 3
    reviewers:
      - "AuraFrameFxDev"
    labels:
      - "dependencies"
      - "native"
      - "collab-canvas"
